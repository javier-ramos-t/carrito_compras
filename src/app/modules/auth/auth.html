<main class="container page page--center">
    <section class="page__head page__head--narrow">
      <div>
        <h1 class="h1">Iniciar sesión</h1>
        <p class="muted">Accede para poder cargar productos.</p>
      </div>
    </section>
  
    <section class="grid grid--single">
        <article class="card">
            <header class="card__head">
              <h2 class="h2">Login</h2>
              <div class="muted">Solo cuentas pueden cargar productos</div>
            </header>
          
            <form class="form" autocomplete="on" [formGroup]="loginForm" (ngSubmit)="login()">
              <div class="field">
                <label class="label" for="email">Nombre de Usuario</label>
                <input id="email" class="input" type="input" formControlName="username" placeholder="Nombre de Usuario" />
                
                @if(isFieldInvalid('username')){
                  <p class="error"> {{getFieldError('username')}} </p>
                }
                
                
              </div>
              <div class="field">
                <label class="label" for="pass">Contraseña</label>
                <input id="pass" class="input" type="password" formControlName="password" placeholder="••••••••" />

                @if(isFieldInvalid('password')){
                  <p class="error"> {{getFieldError('password')}} </p>
                }
              </div>
              <div class="form__row">
                <label class="check">
                  <input type="checkbox" />
                  <span>Recordarme</span>
                </label>
                <a class="link" href="#" (click)="$event.preventDefault()">¿Olvidaste tu contraseña?</a>
              </div>
              <div class="form__actions">
                <button class="btn btn--primary" type="submit" >Entrar</button>
                <button class="btn btn--ghost" type="button">Crear cuenta</button>
              </div>
            </form>
          </article>
          
    </section>
  </main>
