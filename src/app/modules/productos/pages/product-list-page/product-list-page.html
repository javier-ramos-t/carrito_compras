<main class="container page">
    <section class="page__head page__head--wide">
      <div>
        <h1 class="h1">Productos</h1>
        <p class="muted">Catálogo (datos de prueba en el componente, sin servicio).</p>
      </div>
      <div class="page__meta">
        <button class="btn btn--primary" type="button" (click)="openCreateModal()">Nuevo producto</button>
      </div>
    </section>
  
    <section class="grid grid--single-wide">
      <article class="card">
        <header class="card__head">
          <h2 class="h2">Listado</h2>
          <div class="muted">10 ítems</div>
        </header>
  
        
        <app-product-table [products] = "products()" 
        (edit)="onEdit($event)"
        (delete)="onDelete($event)"
        />
        
  
      </article>
    </section>
  </main>


  <dialog #ProductDialog class="modal" (click)="onDialogBackdrop($event)">
    <div class="modal__surface card" (click)="$event.stopPropagation()">
      <header class="card__head">
        <h2 class="h2">{{ modalTitle() }}</h2>
      </header>


      <form class="form">
        <div class="field">
          <label class="label" for="pm-name">Nombre</label>
          <input id="pm-name" class="input" type="text" placeholder="Ej: Sudadera" />
        </div>
        <div class="field">
          <label class="label" for="pm-price">Descripción</label>
          <input id="pm-price" class="input" type="number" min="0" step="0.01"  />
        </div>
        <div class="field">
          <label class="label" for="pm-price">Precio</label>
          <input id="pm-price" class="input" type="number" min="0" step="0.01"  />
        </div>
        <div class="field">
          <label class="label" for="pm-price">Categoria</label>
          <select  class="input" id="product-category" formControlName="category" required>
            <option value="">Selecciona una categoría</option>
            <option value="1">
                Electronica
            </option>
            <option value="2">
              prueba
          </option>
        </select>
        </div>
  
        <div class="form__row form__row--2">
          <div class="field">
            <label class="label" for="pm-stock">Stock</label>
            <input id="pm-stock" class="input" type="number" min="0" step="1"  />
          </div>
        </div>
        <div class="form__actions">
          <button class="btn btn--primary" type="submit">Guardar</button>
          <button class="btn btn--ghost" type="button">Cancelar</button>
        </div>
      </form>
  
  
    </div>
  </dialog>
